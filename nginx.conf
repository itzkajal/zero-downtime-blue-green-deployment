resolver 127.0.0.11 valid=10s;

upstream app_backend {
    # server app-green:80;
    server app-blue:80;
}

server {
    listen 80;

    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}






